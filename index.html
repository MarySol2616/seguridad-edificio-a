<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Edificio A - Plantel 13</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #003366; }
        h1 { color: #003366; text-align: center; font-size: 24px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .btn-interactivo { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-fisica { background-color: #d32f2f; } /* Rojo Institucional */
        .btn-tic { background-color: #0056b3; }    /* Azul Institucional */
        .btn-ropci { background-color: #fbc02d; color: #000; } /* Amarillo Alerta */
        .btn-interactivo:hover { transform: scale(1.02); opacity: 0.9; }
        #info-panel { margin-top: 20px; padding: 20px; background-color: #f8f9fa; border-left: 5px solid #003366; border-radius: 10px; min-height: 200px; }
        .mapa-container { text-align: center; margin-top: 20px; }
        .mapa-img { width: 100%; max-width: 700px; border: 5px solid white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Portal de Seguridad: Edificio A</h1>
    <p style="text-align: center; color: #666;">Colegio de Bachilleres Plantel 13 Xochimilco-Tepepan</p>

    <div class="btn-group">
        <button class="btn-interactivo btn-fisica" onclick="mostrar('fisica')">🔥 Física de Incendios y Repliegue</button>
        <button class="btn-interactivo btn-tic" onclick="mostrar('tic')">💻 Sistema Digital (TIC)</button>
        <button class="btn-interactivo btn-ropci" onclick="mostrar('ropci')">🛡️ Normativa ROPCI</button>
    </div>

    <div id="info-panel">
        <h3 id="panel-titulo">📍 Mapa General de Seguridad</h3>
        <div id="panel-contenido">
            <p id="panel-texto">Selecciona una categoría para ver las instrucciones de seguridad, zonas de repliegue y equipo de emergencia.</p>
            <div class="mapa-container">
                <img src="croquis.jpg" alt="Croquis Edificio A" class="mapa-img">
            </div>
        </div>
    </div>
</div>

<script>
    function mostrar(categoria) {
        const titulo = document.getElementById('panel-titulo');
        const texto = document.getElementById('panel-texto');
        
        const datos = {
            'fisica': {
                'titulo': '🔥 Instrucciones de Repliegue e Incendios',
                'texto': '<b>Zonas de Menor Riesgo:</b> Ubícate en las columnas y muros de carga del Edificio A. Aléjate de ventanales y objetos que puedan caer.<br><br><b>Zonas de Mayor Riesgo:</b> Pasillos con vitrales y escaleras durante el movimiento.<br><br><b>Combate de Incendios:</b> Contamos con extintores PQS vigentes. Identifica el más cercano en el mapa.'
            },
            'tic': {
                'titulo': '💻 Innovación Tecnológica en Seguridad',
                'texto': 'Como parte de la transversalidad académica, este portal permite el acceso rápido a los protocolos desde cualquier dispositivo.<br><br><b>Proyecto:</b> Digitalización de planos de señalización para respuesta inmediata.'
            },
            'ropci': {
                'titulo': '🛡️ Cumplimiento Normativo ROPCI',
                'texto': '<b>Estatus:</b> Este plantel cumple con el Reglamento de Instalaciones contra Incendios.<br><br><b>Señalética:</b> Todas las rutas de evacuación y puntos de reunión cumplen con la norma de fotoluminiscencia y dimensiones oficiales.'
            }
        };

        const info = datos[categoria];
        titulo.innerHTML = info.titulo;
        texto.innerHTML = info.texto;
    }
</script>

</body>
</html>
