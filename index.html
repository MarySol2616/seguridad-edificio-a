<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Seguridad - Edificio A</title>
    <style>
        :root { --cobach-blue: #003366; --safety-red: #d32f2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        header { background-color: var(--cobach-blue); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-interactivo { background: var(--safety-red); color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1em; transition: 0.3s; margin: 10px 0; }
        .btn-interactivo:hover { background: #b71c1c; transform: scale(1.02); }
        #info-panel { display: none; margin-top: 20px; padding: 15px; border-left: 5px solid var(--cobach-blue); background: #eef2f7; line-height: 1.6; }
        .badge { background: #eee; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        footer { text-align: center; padding: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<header>
    <h1>Colegio de Bachilleres - Edificio A</h1>
    <p>Portal de Seguridad Interactiva (Normativa ROPCI)</p>
</header>

<div class="container">
    <h2>Seleccione una Categoría de Seguridad:</h2>
    
    <button class="btn-interactivo" onclick="mostrar('fisica')">⚡ Física de Incendios</button>
    <button class="btn-interactivo" onclick="mostrar('tic')">💻 Sistema Digital (TIC)</button>
    <button class="btn-interactivo" onclick="mostrar('ropci')">🛡️ Normativa ROPCI</button>

    <div id="info-panel">
        <div style="text-align: center; padding: 20px; background-color: #f4f4f4; border-radius: 15px; margin: 20px 0;">
    <h2 style="color: #003366;">📍 Mapa de Seguridad - Edificio A</h2>
    <img src="croquis.jpg" alt="croquis Edificio A" style="width: 100%; max-width: 700px; border: 8px solid white; border-radius: 10px; box-shadow: 0px 4px 15px rgba(0,0,0,0.2);">
    <p style="margin-top: 15px; color: #444; font-weight: bold;">Identifica tus rutas de evacuación y puntos de reunión.</p>
</div>
        <h3 id="panel-titulo"></h3>
        <p id="panel-contenido"></p>
    </div>
</div>

<footer>
    <p>Desarrollado con IA para el Área de Ingeniería y TIC</p>
</footer>

<script>
    const datos = {
        fisica: {
            titulo: "Análisis Físico del Fuego",
            contenido: "<b>Transferencia de Calor:</b> En el Edificio A, vigilamos la Convección y Radiación. <br><br><b>Presión de Fluidos:</b> Los extintores operan bajo leyes de gases ideales. Un extintor de $CO_2$ debe mantener una presión interna de aproximadamente $5.5 \text{ MPa}$ a $20°C$."
        },
        tic: {
            titulo: "Infraestructura Digital de Emergencia",
            contenido: "<b>IA en Seguridad:</b> Este sitio web utiliza algoritmos de optimización para mostrar rutas de evacuación. <br><br><b>Inventario QR:</b> Cada punto de seguridad está vinculado a la base de datos central de DG para evitar extravíos."
        },
        ropci: {
            titulo: "Cumplimiento Normativo ROPCI",
            contenido: "<b>Instalaciones:</b> Cumplimos con la dotación de extintores portátiles y señalética fotoluminiscente. <br><br><b>Mantenimiento:</b> Según el ROPCI, la revisión trimestral es obligatoria para garantizar la eficacia de los sistemas activos."
        }
    };

    function mostrar(categoria) {
        const panel = document.getElementById('info-panel');
        document.getElementById('panel-titulo').innerText = datos[categoria].titulo;
        document.getElementById('panel-contenido').innerHTML = datos[categoria].contenido;
        panel.style.display = 'block';
        panel.scrollIntoView({behavior: "smooth"});
    }
</script>

</body>
</html>
